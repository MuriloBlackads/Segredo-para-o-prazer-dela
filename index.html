        (function(w) {
            var eventCache = {};
            var fbqQueue = [];
            
            function smartFbq() {
                var args = Array.prototype.slice.call(arguments);
                var action = args[0];
                var name = args[1];
                var data = args[2] || {};

                // 1. Force-disable AutoConfig on every 'init' or 'set'
                if (action === 'set' && name === 'autoConfig') { args[2] = false; }
                if (action === 'init') { 
                    smartFbq('set', 'autoConfig', false, name); 
                }

                // 2. Comprehensive Deduplication (10s window) + Block Automated ViewContent
                if (action === 'track' || action === 'trackCustom') {
                    // BLOCK automated ViewContent (triggered by SDK/Wistia) unless manually marked
                    if (name === 'ViewContent' && !data._manual) {
                        console.log("PIXEL: BLOCKED AUTOMATED ViewContent");
                        return;
                    }
                    
                    var key = name + JSON.stringify(data);
                    var now = Date.now();
                    if (eventCache[key] && (now - eventCache[key] < 10000)) {
                        console.log("PIXEL: DUPLICATE BLOCKED ->", name);
                        return;
                    }
                    eventCache[key] = now;
                    console.log("PIXEL: TRACKING ->", name);
                    
                    // Remove the manual flag before sending to Facebook
                    if (data._manual) delete data._manual;
                }

                // 3. Forwarding logic
                if (w.fbq.callMethod) {
                    w.fbq.callMethod.apply(w.fbq, args);
                } else {
                    fbqQueue.push(args);
                }
            }

                writable: false,
                configurable: false
