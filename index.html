                      <script>
                        var fakeBarInterval;
                        var fakeProgress = 0;
                        var hasStartedSound = false;
                        var wistiaPlayer;
                        var delayTimeSeconds = 9 * 60; // 9 minutos em segundos
                        var buttonRevealed = false;

                        window._wq = window._wq || [];
                        _wq.push({ 
                          id: "14x4ao7uue", 
                          onReady: function(video) {
                             var lastTime = -1;
                             var lastMoveTime = Date.now();
                             var watchdogInterval;

                             // WATCHDOG: Restart video if it stays stuck for too long while in 'playing' state
                             function startWatchdog() {
                               if (watchdogInterval) clearInterval(watchdogInterval);
                               watchdogInterval = setInterval(function() {
                                 var state = video.state();
                                 if (state === "playing") {
                                   var currentTime = video.time();
                                   if (currentTime === lastTime) {
                                     if (Date.now() - lastMoveTime > 5000) { // 5 segundos parado
                                       console.log("VSL Watchdog: Detectado travamento. Reiniciando...");
                                       video.play();
                                       lastMoveTime = Date.now();
                                     }
                                   } else {
                                     lastTime = currentTime;
                                     lastMoveTime = Date.now();
                                   }
                                 }
                               }, 2000);
                             }

                             // Time update event - THE MOST IMPORTANT
                             video.bind("timechange", function(t) {
                               // Se o tempo está correndo, NADA deve estar na frente do vídeo
                               var loader = document.getElementById('vslLoading');
                               var pauseO = document.getElementById('pauseOverlay');
                               var unmuteO = document.getElementById('centerUnmuteOverlay');

                               if (loader && loader.classList.contains('active')) loader.classList.remove('active');
                               if (pauseO && pauseO.classList.contains('active')) pauseO.classList.remove('active');
                               
                               // Só esconde o unmute se o som já tiver começado ou se o vídeo desmudar
                               if (hasStartedSound || !video.isMuted()) {
                                 if (unmuteO) unmuteO.style.display = 'none';
                               }

                               // Checagem de Delay do Botão
                               if (!buttonRevealed && t >= delayTimeSeconds) {
                                 var btnContainer = document.getElementById('vslBuyButtonContainer');
                                 btnContainer.style.display = 'flex';
                                 btnContainer.scrollIntoView({ behavior: 'smooth', block: 'center' });
                                 buttonRevealed = true;
                               }
                             });

                             // Play event
                             video.bind("play", function() {
                               document.getElementById('pauseOverlay').classList.remove('active');
                               document.getElementById('vslLoading').classList.remove('active');
                               startFakeBar();
                               startWatchdog();
                               
                               if (!video.isMuted()) {
                                 document.getElementById('centerUnmuteOverlay').style.display = 'none';
                                 hasStartedSound = true;
                               }
                             });

                             // Pause event 
                             video.bind("pause", function() {
                               // Só mostra o overlay de pausa se NÃO estiver carregando e já tiver áudio
                               if (hasStartedSound && video.state() === "paused") {
                                 document.getElementById('pauseOverlay').classList.add('active');
                                 stopFakeBar();
                               }
                             });

                             // Buffering events
                             video.bind("waiting", function() {
                               document.getElementById('vslLoading').classList.add('active');
                             });

                             video.bind("playing", function() {
                               document.getElementById('vslLoading').classList.remove('active');
                               document.getElementById('pauseOverlay').classList.remove('active');
                             });

                             // Ended event
                             video.bind("end", function() {
                               stopFakeBar();
                               if (watchdogInterval) clearInterval(watchdogInterval);
                               document.getElementById('fakeProgressFill').style.width = '100%';
                             });
                          }
                        });

                        function unmuteWistia() {
                          if (wistiaPlayer) {
                            wistiaPlayer.unmute();
                            wistiaPlayer.play(); // Ensure it stays playing
                            document.getElementById('centerUnmuteOverlay').style.display = 'none';
                            hasStartedSound = true;
                          }
                        }

                        function resumeVideo() {
                          if (wistiaPlayer) {
                            document.getElementById('pauseOverlay').classList.remove('active');
                            wistiaPlayer.play();
                          }
                        }

                        // === Fake Progress Bar Logic ===
                        function startFakeBar() {
                          if (fakeBarInterval) return;
                          if (fakeProgress < 85) fakeProgress = 85;

                          fakeBarInterval = setInterval(function() {
                            fakeProgress += (Math.random() * 0.3) + 0.05;
                            if (fakeProgress >= 98) fakeProgress = 85 + Math.random() * 5;
                            document.getElementById('fakeProgressFill').style.width = fakeProgress + '%';
                          }, 800);
                        }

                        function stopFakeBar() {
                          if (fakeBarInterval) {
                            clearInterval(fakeBarInterval);
                            fakeBarInterval = null;
                          }
                        }
